server:
  forward-headers-strategy: framework

spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            redirect-uri: https://spring-backend-lab.ru/login/oauth2/code/keycloak

        provider:
          keycloak:
            issuer-uri: https://auth.spring-backend-lab.ru/realms/spring-backend-lab
            token-uri: http://keycloak:8080/realms/spring-backend-lab/protocol/openid-connect/token
            jwk-set-uri: http://keycloak:8080/realms/spring-backend-lab/protocol/openid-connect/certs
            user-info-uri: http://keycloak:8080/realms/spring-backend-lab/protocol/openid-connect/userinfo

app:
  backend:
    url: http://backend:8080

